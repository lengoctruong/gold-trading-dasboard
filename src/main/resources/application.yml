spring:
  application:
    name: gold-trading-dashboard-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gold_trading_bot}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: dasboard
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: public
    ignore-migration-patterns: "*:missing"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${APP_PORT:8088}

app:
  jwt:
    secret: ${APP_JWT_SECRET_BASE64:}
    access-token-minutes: ${APP_JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${APP_JWT_REFRESH_TOKEN_DAYS:30}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://172.188.217.183:5173}
  mt5:
    encryption-key: ${APP_MT5_ENCRYPTION_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true


