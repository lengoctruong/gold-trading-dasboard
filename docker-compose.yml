services:
  postgres:
    image: postgres:16
    container_name: gtb-postgres
    environment:
      POSTGRES_DB: goldtrading
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: gtb-backend
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "8080:8080"

volumes:
  postgres_data:

